<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elm Website</title>
    <base href="/">
</head>
<body>
    <div id="elm-main"></div>
    <script src="main.js"></script>
    <script>
        var app = Elm.Main.init({ node: document.getElementById('elm-main') });
    </script>
    <style>
      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f7f9fb;
        margin: 0;
        color: #222;
      }
      
      /* Header Styles */
      .site-header {
        background: #fff;
        color: #333;
        padding: 0;
        text-align: left;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin-bottom: 0;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      
      .header-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      .header-top {
        background: #1976d2;
        color: white;
        padding: 8px 0;
        font-size: 14px;
      }
      
      .header-top-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .header-top a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
      }
      
      .header-top a:hover {
        color: #ffeb3b;
      }
      
      .header-main {
        padding: 20px 0;
        background: white;
      }
      
      .header-main-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .logo {
        font-size: 28px;
        font-weight: bold;
        color: #1976d2;
        text-decoration: none;
      }
      
      .logo:hover {
        color: #1256a2;
      }
      
      .site-nav {
        display: flex;
        gap: 0;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      
      .site-nav a {
        color: #333;
        text-decoration: none;
        padding: 12px 20px;
        font-weight: 500;
        font-size: 16px;
        transition: all 0.2s;
        border-radius: 4px;
        margin: 0 2px;
      }
      
      .site-nav a:hover {
        background: #f5f7fa;
        color: #1976d2;
      }
      
      .site-nav a.active {
        background: #1976d2;
        color: white;
      }
      
      /* Main Content */
      .main-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 20px;
        margin: 20px auto;
        max-width: 400px;
        text-align: left;
      }
      
      .product-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
        margin: 32px 0;
      }
      
      .product-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 20px;
        width: 260px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .product-card img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 12px;
        background: #eee;
      }
      
      .product-card h3 {
        margin: 10px 0 8px 0;
        font-size: 1.2em;
      }
      
      .product-card p {
        font-size: 0.98em;
        color: #555;
        margin-bottom: 16px;
      }
      
      .product-card button {
        background: #1976d2;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 18px;
        font-size: 1em;
        cursor: pointer;
        transition: background 0.2s;
      }
      
      .product-card button:hover {
        background: #1256a2;
      }
      
      /* Calculator specific styles */
      .loan-calculator {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      
      /* Responsive Design */
      @media (max-width: 768px) {
        .header-main-content {
          flex-direction: column;
          gap: 20px;
        }
        
        .site-nav {
          flex-wrap: wrap;
          justify-content: center;
        }
        
        .site-nav a {
          padding: 8px 12px;
          font-size: 14px;
        }
      }
      
      /* Footer Styles */
      .site-footer {
        background: #2c3e50;
        color: white;
        padding: 40px 0 20px 0;
        margin-top: 60px;
      }
      
      .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      .footer-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 40px;
        margin-bottom: 30px;
      }
      
      .footer-section h3 {
        color: #3498db;
        margin-bottom: 15px;
        font-size: 18px;
        font-weight: 600;
      }
      
      .footer-section ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      
      .footer-section li {
        margin-bottom: 8px;
      }
      
      .footer-section a {
        color: #bdc3c7;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }
      
      .footer-section a:hover {
        color: #3498db;
      }
      
      .footer-bottom {
        border-top: 1px solid #34495e;
        padding-top: 20px;
        text-align: center;
        color: #bdc3c7;
        font-size: 14px;
      }
      
      .footer-logo {
        font-size: 24px;
        font-weight: bold;
        color: #3498db;
        margin-bottom: 15px;
        display: block;
      }
      
      .footer-logo:hover {
        color: #2980b9;
      }
      
      /* Home Page Styles */
      .home-page {
        min-height: 100vh;
      }
      
      .hero-section {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 80px 0;
        position: relative;
        overflow: hidden;
      }
      
      .hero-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
      }
      
      .hero-title {
        font-size: 3.5rem;
        font-weight: 700;
        margin-bottom: 20px;
        line-height: 1.2;
      }
      
      .hero-subtitle {
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 40px;
        opacity: 0.9;
      }
      
      .hero-buttons {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
      
      .btn-primary {
        background: #fff;
        color: #667eea;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }
      
      .btn-secondary {
        background: transparent;
        color: white;
        border: 2px solid white;
        padding: 13px 28px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      
      .btn-secondary:hover {
        background: white;
        color: #667eea;
      }
      
      .btn-large {
        padding: 18px 40px;
        font-size: 18px;
      }
      
      .hero-image {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .hero-placeholder {
        font-size: 8rem;
        opacity: 0.8;
        animation: float 6s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      .features-section {
        padding: 100px 0;
        background: #f8fafc;
      }
      
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      
      .section-title {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 60px;
        color: #2d3748;
      }
      
      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 40px;
      }
      
      .feature-card {
        background: white;
        padding: 40px 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        transition: transform 0.3s;
      }
      
      .feature-card:hover {
        transform: translateY(-10px);
      }
      
      .feature-icon {
        font-size: 3rem;
        margin-bottom: 20px;
      }
      
      .feature-card h3 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 15px;
        color: #2d3748;
      }
      
      .feature-card p {
        color: #718096;
        line-height: 1.6;
      }
      
      .cta-section {
        background: linear-gradient(135deg, #2d3748 0%, #4a5568 100%);
        color: white;
        padding: 100px 0;
        text-align: center;
      }
      
      .cta-section h2 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 20px;
      }
      
      .cta-section p {
        font-size: 1.2rem;
        margin-bottom: 40px;
        opacity: 0.9;
      }
      
      /* Responsive Design for Home Page */
      @media (max-width: 768px) {
        .hero-content {
          grid-template-columns: 1fr;
          text-align: center;
          gap: 40px;
        }
        
        .hero-title {
          font-size: 2.5rem;
        }
        
        .hero-buttons {
          justify-content: center;
        }
        
        .features-grid {
          grid-template-columns: 1fr;
        }
        
        .section-title {
          font-size: 2rem;
        }
      }
      
      /* About Us Page Styles */
      .about-page {
        min-height: 100vh;
      }
      .about-banner {
        position: relative;
        width: 100%;
        height: 340px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f9fb;
        margin-bottom: 0;
      }
      .about-banner-img {
        width: 100%;
        height: 340px;
        object-fit: cover;
        filter: brightness(0.7) blur(0.5px);
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .about-banner-content {
        position: relative;
        z-index: 2;
        text-align: center;
        color: #fff;
        width: 100%;
      }
      .about-title {
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 1px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      .about-subtitle {
        font-size: 1.3rem;
        font-weight: 400;
        margin-bottom: 0;
        text-shadow: 0 1px 4px rgba(0,0,0,0.18);
      }
      .about-section {
        max-width: 800px;
        margin: 60px auto 0 auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        padding: 40px 32px;
      }
      .about-section h2 {
        color: #1976d2;
        font-size: 2rem;
        margin-top: 0;
        margin-bottom: 12px;
      }
      .about-section p {
        color: #444;
        font-size: 1.1rem;
        line-height: 1.7;
        margin-bottom: 28px;
      }
      @media (max-width: 900px) {
        .about-section {
          padding: 30px 10px;
        }
        .about-title {
          font-size: 2.2rem;
        }
        .about-banner-img, .about-banner {
          height: 200px;
        }
      }
      
      /* Contact Page Styles */
      .contact-page {
        min-height: 80vh;
        background: #f8fafc;
      }
      .contact-layout {
        display: flex;
        max-width: 900px;
        margin: 0 auto 60px auto;
        gap: 40px;
        align-items: flex-start;
      }
      .contact-sidebar {
        flex: 1 1 260px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 32px 24px;
        min-width: 220px;
      }
      .company-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .company-list li {
        margin-bottom: 28px;
      }
      .company-name {
        font-weight: 600;
        color: #1976d2;
        font-size: 1.08rem;
        display: block;
        margin-bottom: 4px;
      }
      .company-address, .company-phone {
        color: #444;
        font-size: 0.98rem;
        margin: 0 0 2px 0;
      }
      .contact-form {
        flex: 2 1 400px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 32px 28px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .form-label {
        font-weight: 500;
        color: #1976d2;
        margin-bottom: 2px;
      }
      .form-input {
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 1rem;
        background: #f8fafc;
        transition: border 0.2s;
      }
      .form-input:focus {
        border: 1.5px solid #1976d2;
        outline: none;
        background: #fff;
      }
      .btn-primary {
        background: #1976d2;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 12px 28px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
      }
      .btn-primary:hover {
        background: #1256a2;
      }
      @media (max-width: 900px) {
        .contact-layout {
          flex-direction: column;
          gap: 24px;
        }
        .contact-sidebar, .contact-form {
          min-width: 0;
          width: 100%;
        }
      }
    </style>
</body>
</html>
